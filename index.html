<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Jime & Moi — El Mapa del Tesoro · Las Rockies</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pirata+One&family=IM+Fell+English+SC&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#E7D8B5; --paper-d:#D6C094; --paper-l:#F4EAD0; --paper-edge:#C9B083;
  --ink:#2A2016; --ink2:#54422C; --ink3:#856A48;
  --wax:#9E342A; --wax-d:#7A271F; --wax-l:#C0503F;
  --brass:#B8893B; --brass-d:#8A6526; --brass-l:#E6C079;
  --teal:#2E6E6A; --line:rgba(42,32,22,.22); --line2:rgba(42,32,22,.12);
  --disp:'Pirata One',system-ui,cursive; --label:'IM Fell English SC',serif;
  --body:'EB Garamond',Georgia,serif; --mono:'Space Mono',monospace;
  --d1:#9E342A; --d2:#2E6E6A; --d3:#A65A2E; --d4:#3A406E; --d5:#3C6B3A; --d6:#6A3A5E; --d7:#8A6526;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#2A2016;color:var(--ink);font-family:var(--body);font-size:16px;-webkit-font-smoothing:antialiased}
#map{position:fixed;inset:0;width:100%;height:100%;background:#cdbb95;z-index:0}

/* ---- treasure tint on tiles ---- */
body.treasure .leaflet-tile{filter:sepia(.52) saturate(.72) contrast(1.04) brightness(1.03) hue-rotate(-8deg)}
/* fixed scene sheen: warm vignette + paper grain, above map scene, below panels */
.scene-fx{position:fixed;inset:0;z-index:500;pointer-events:none;opacity:0;transition:opacity .5s}
body.treasure .scene-fx{opacity:1}
.scene-fx .vig{position:absolute;inset:0;
  background:radial-gradient(125% 95% at 50% 42%,transparent 52%,rgba(74,49,20,.30) 84%,rgba(48,30,12,.62) 100%)}
.scene-fx .grain{position:absolute;inset:0;mix-blend-mode:multiply;opacity:.5;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix type='saturate' values='0'/></filter><rect width='180' height='180' filter='url(%23n)' opacity='0.5'/></svg>")}

/* =================== TACTILE PRIMITIVES =================== */
.btn{appearance:none;cursor:pointer;font-family:var(--label);color:var(--ink);
  background:linear-gradient(180deg,var(--paper-l),var(--paper-d));
  border:1px solid var(--brass-d);border-radius:9px;padding:8px 13px;letter-spacing:.03em;
  box-shadow:inset 0 1px 0 #FBF3DE, inset 0 -2px 0 rgba(138,101,38,.55), 0 2px 0 #9A7B3C, 0 4px 7px rgba(40,25,10,.35);
  transition:transform .06s, box-shadow .06s, background .15s}
.btn:hover{background:linear-gradient(180deg,#FBF3DE,var(--paper))}
.btn:active,.btn.on{transform:translateY(2px);
  box-shadow:inset 0 2px 5px rgba(80,50,20,.42), inset 0 -1px 0 rgba(255,250,235,.4), 0 1px 2px rgba(40,25,10,.25)}
.btn.on{background:linear-gradient(180deg,var(--brass),var(--brass-d));color:#fff6e2;text-shadow:0 1px 0 rgba(80,40,10,.5)}

/* =================== HEADER (brass plank) =================== */
.hdr{position:fixed;top:0;left:0;right:0;height:62px;z-index:1000;display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;background:linear-gradient(180deg,#C79A4E,#A87E33);
  border-bottom:2px solid #6E4F1E;box-shadow:inset 0 1px 0 #E8CE8B,0 4px 14px rgba(30,18,4,.45)}
.brand{display:flex;align-items:center;gap:12px;min-width:0}
.brand .mark{font-family:var(--disp);font-size:30px;line-height:1;color:#3a2a12;text-shadow:0 1px 0 #E8CE8B,0 2px 3px rgba(0,0,0,.25);white-space:nowrap}
.brand .mark em{color:var(--wax-d);font-style:normal}
.brand .sub{font-family:var(--label);font-size:12px;letter-spacing:.14em;color:#5a4316;text-transform:uppercase;white-space:nowrap;border-left:1px solid rgba(80,55,15,.4);padding-left:12px}
.hdr-right{display:flex;align-items:center;gap:12px}
.dates{font-family:var(--mono);font-size:11px;color:#4a360f;text-align:right;line-height:1.5}
.dates b{color:#2a1d06;font-weight:700}
.seg{display:flex;gap:5px}
.menu-btn{display:none}

/* =================== FILTER STAMPS =================== */
.filters{position:fixed;top:74px;left:50%;transform:translateX(-50%);z-index:900;display:flex;gap:7px;
  padding:8px;background:linear-gradient(180deg,rgba(244,234,208,.92),rgba(214,192,148,.92));backdrop-filter:blur(7px);
  border:1px solid var(--brass-d);border-radius:13px;box-shadow:inset 0 1px 0 #FBF3DE,0 6px 18px rgba(40,25,10,.4);
  max-width:calc(100vw - 28px);overflow-x:auto;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.chip{flex:none;font-family:var(--label);font-size:13px;letter-spacing:.02em;padding:7px 12px;display:flex;align-items:center;gap:6px}
.chip .i{font-size:14px;line-height:1}

/* =================== LEDGER WINDOW =================== */
.win{position:fixed;top:74px;left:16px;bottom:16px;width:346px;z-index:850;display:flex;flex-direction:column;
  background:linear-gradient(180deg,rgba(238,226,198,.93),rgba(224,206,166,.93));backdrop-filter:blur(9px) saturate(1.1);
  border:1px solid var(--brass-d);border-radius:12px;
  box-shadow:inset 0 1px 0 #FBF3DE, 0 0 0 1px rgba(110,79,30,.25), 0 22px 50px rgba(25,15,4,.55);overflow:hidden}
.titlebar{flex:none;height:34px;display:flex;align-items:center;gap:9px;padding:0 11px;cursor:grab;
  background:repeating-linear-gradient(180deg,#C79A4E 0 2px,#BE9143 2px 4px);
  border-bottom:2px solid #6E4F1E;box-shadow:inset 0 1px 0 #EBD299}
.titlebar:active{cursor:grabbing}
.tl-dots{display:flex;gap:6px}
.tl-dots i{width:13px;height:13px;border-radius:50%;display:block;border:1px solid rgba(70,40,10,.5);box-shadow:inset 0 1px 0 rgba(255,255,255,.5)}
.tl-dots i.r{background:radial-gradient(circle at 35% 30%,#d2685a,#9E342A)}
.tl-dots i.y{background:radial-gradient(circle at 35% 30%,#e8c468,#B8893B)}
.tl-dots i.g{background:radial-gradient(circle at 35% 30%,#7fae6b,#3C6B3A)}
.tl-title{font-family:var(--label);font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:#3a2a12;text-shadow:0 1px 0 #EBD299}

.tabs{flex:none;display:flex;gap:6px;padding:9px 10px 4px;border-bottom:1px solid var(--line2)}
.tab{flex:1;font-family:var(--label);font-size:13px;padding:8px 6px;text-align:center}

.win-head{padding:13px 15px 10px;flex:none}
.eyebrow{font-family:var(--label);font-size:12px;letter-spacing:.22em;color:var(--wax-d);text-transform:uppercase}
.win-head h1{font-family:var(--disp);font-size:27px;line-height:1.04;color:var(--ink);margin:3px 0 1px;font-weight:400}
.win-head h1 em{color:var(--wax-d);font-style:normal}
.stats{display:flex;gap:7px;margin-top:11px;flex-wrap:wrap}
.stat{flex:1;min-width:60px;background:linear-gradient(180deg,var(--paper-l),var(--paper-d));border:1px solid var(--line);border-radius:8px;padding:7px 8px;
  box-shadow:inset 0 1px 0 rgba(255,250,235,.7)}
.stat .n{font-family:var(--disp);font-size:19px;color:var(--ink);line-height:1}
.stat .l{font-family:var(--mono);font-size:8.5px;letter-spacing:.08em;color:var(--ink3);text-transform:uppercase;margin-top:3px}

.scroll{overflow-y:auto;padding:8px 11px 12px;flex:1;scrollbar-width:thin;scrollbar-color:var(--brass) transparent}
.scroll::-webkit-scrollbar{width:9px}
.scroll::-webkit-scrollbar-track{background:rgba(120,90,40,.12)}
.scroll::-webkit-scrollbar-thumb{background:linear-gradient(180deg,var(--brass-l),var(--brass-d));border-radius:5px;border:1px solid var(--brass-d)}

/* trail of days */
.trail{position:relative}
.trail::before{content:"";position:absolute;left:25px;top:26px;bottom:26px;width:0;
  border-left:3px dotted var(--ink3);opacity:.6}
.day{position:relative;cursor:pointer;margin:2px 0}
.day-row{display:flex;gap:13px;align-items:flex-start;padding:8px;border-radius:10px;transition:background .14s}
.day:hover .day-row{background:rgba(120,90,40,.10)}
.day.open .day-row{background:rgba(120,90,40,.16);box-shadow:inset 0 0 0 1px var(--line)}
.seal{width:36px;height:36px;flex:none;border-radius:50% 48% 52% 50%/50% 52% 48% 50%;display:flex;align-items:center;justify-content:center;
  font-family:var(--disp);font-size:18px;color:#fff3e0;position:relative;z-index:2;background:var(--dc);
  background:radial-gradient(circle at 36% 30%,color-mix(in srgb,var(--dc) 70%,#fff 18%),var(--dc) 62%,color-mix(in srgb,var(--dc) 60%,#000 30%));
  border:1px solid rgba(40,20,8,.5);
  box-shadow:0 0 0 3px var(--paper), 0 2px 5px rgba(30,16,4,.5), inset 0 1px 2px rgba(255,255,255,.35), inset 0 -2px 4px rgba(0,0,0,.3);
  text-shadow:0 1px 1px rgba(0,0,0,.4);transition:transform .14s}
.day:hover .seal,.day.open .seal{transform:scale(1.07) rotate(-3deg)}
.day-meta{flex:1;min-width:0;padding-top:1px}
.dtag{font-family:var(--mono);font-size:9px;letter-spacing:.12em;color:var(--dc);text-transform:uppercase;font-weight:700}
.dttl{font-family:var(--body);font-weight:600;font-size:17px;line-height:1.12;margin:1px 0 2px;color:var(--ink)}
.dsub{font-family:var(--mono);font-size:10px;color:var(--ink3);display:flex;gap:9px;flex-wrap:wrap}
.dsub .pill{background:rgba(120,90,40,.14);border-radius:5px;padding:1px 6px}
.dblurb{font-size:14.5px;line-height:1.45;color:var(--ink2);margin:7px 0 2px}
.dtip{font-size:13px;line-height:1.4;color:var(--ink2);margin-top:7px;padding:7px 9px;border-radius:8px;
  background:rgba(158,52,42,.10);border:1px solid rgba(158,52,42,.28)}
.dtip b{color:var(--wax-d);font-family:var(--label);letter-spacing:.04em}

.sites{max-height:0;overflow:hidden;transition:max-height .34s ease;margin-left:46px}
.day.open .sites{max-height:1200px}
.site{display:flex;gap:9px;padding:8px 2px;border-top:1px dotted var(--line);cursor:pointer}
.site:hover .s-name{color:var(--wax-d)}
.s-time{font-family:var(--mono);font-size:10px;color:var(--ink3);width:52px;flex:none;padding-top:2px}
.s-ico{font-size:15px;flex:none}
.s-name{font-size:14.5px;font-weight:500;color:var(--ink);line-height:1.3}

/* tesoros list */
.tcity{margin:4px 0 10px}
.tcity h3{font-family:var(--disp);font-size:21px;color:var(--ink);font-weight:400;display:flex;align-items:center;gap:9px;margin:6px 2px 6px}
.tcity h3::after{content:"";flex:1;height:0;border-top:2px dotted var(--ink3);opacity:.5}
.tcity .cnt{font-family:var(--mono);font-size:10px;color:var(--ink3)}
.tspot{display:flex;gap:10px;padding:9px;border:1px solid var(--line);border-radius:9px;margin-bottom:6px;cursor:pointer;
  background:linear-gradient(180deg,var(--paper-l),rgba(214,192,148,.55));box-shadow:inset 0 1px 0 rgba(255,250,235,.7);transition:transform .1s,box-shadow .1s}
.tspot:hover{transform:translateY(-1px);box-shadow:inset 0 1px 0 rgba(255,250,235,.7),0 4px 10px rgba(40,25,10,.22)}
.tspot:active{transform:translateY(1px)}
.tspot .tic{width:30px;height:30px;flex:none;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:16px;
  background:var(--paper);border:1px solid var(--cc);box-shadow:0 0 0 2px rgba(255,255,255,.4) inset}
.tspot .tn{font-size:15px;font-weight:600;color:var(--ink);line-height:1.15}
.tspot .tc{font-family:var(--mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--cc);font-weight:700;margin-top:2px}
.tspot .tnote{font-size:12.5px;line-height:1.35;color:var(--ink2);margin-top:3px}

.win-foot{flex:none;padding:10px;border-top:1px solid var(--line2);display:flex;gap:8px}
.win-foot .btn{flex:1;text-align:center;justify-content:center;font-size:12px}

/* =================== NOW RIBBON =================== */
.now{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:800;
  font-family:var(--label);font-size:13px;letter-spacing:.04em;color:#3a2a12;
  background:linear-gradient(180deg,var(--paper-l),var(--paper-d));border:1px solid var(--brass-d);border-radius:10px;
  padding:9px 16px;box-shadow:inset 0 1px 0 #FBF3DE,0 6px 16px rgba(40,25,10,.4);display:flex;align-items:center;gap:10px;
  white-space:nowrap;max-width:calc(100vw - 28px)}
.now .pip{width:9px;height:9px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#d2685a,#9E342A);flex:none;box-shadow:0 0 0 2px rgba(158,52,42,.25)}
.now b{color:var(--wax-d)}

/* =================== COMPASS =================== */
.compass{position:fixed;right:16px;bottom:16px;z-index:800;width:96px;height:96px;pointer-events:none;
  filter:drop-shadow(0 5px 10px rgba(30,16,4,.55))}
@media (max-width:900px){.compass{width:72px;height:72px;right:12px;bottom:84px}}

/* =================== MARKERS =================== */
.mk{display:flex;align-items:center;justify-content:center;cursor:pointer;will-change:transform;transform-origin:center}
.mk.seal-m{width:34px;height:34px;border-radius:50% 48% 52% 50%/50% 52% 48% 50%;font-family:var(--disp);font-size:17px;color:#fff3e0;background:var(--c);
  background:radial-gradient(circle at 36% 30%,color-mix(in srgb,var(--c) 70%,#fff 18%),var(--c) 60%,color-mix(in srgb,var(--c) 55%,#000 32%));
  border:1px solid rgba(40,20,8,.6);
  box-shadow:0 0 0 3px rgba(231,216,181,.9),0 2px 6px rgba(30,16,4,.55),inset 0 1px 2px rgba(255,255,255,.4),inset 0 -2px 4px rgba(0,0,0,.32);
  text-shadow:0 1px 1px rgba(0,0,0,.45)}
.mk.pin{width:26px;height:26px;border-radius:50%;font-size:14px;background:linear-gradient(180deg,var(--paper-l),var(--paper-d));
  border:2px solid var(--c);box-shadow:0 2px 5px rgba(30,16,4,.5),inset 0 1px 0 rgba(255,250,235,.8)}
.mk.spot{width:24px;height:24px;border-radius:50%;font-size:13px;background:rgba(244,234,208,.96);
  border:1.5px dashed var(--c);box-shadow:0 2px 5px rgba(30,16,4,.45)}
.mk:hover{transform:scale(1.2);z-index:1000}
@media (prefers-reduced-motion:no-preference){
  .mk{animation:pop .45s cubic-bezier(.2,.85,.3,1.25) backwards}
}
@keyframes pop{from{opacity:0;transform:scale(.2)}to{opacity:1;transform:scale(1)}}

/* treasure trail (routes) */
.trail-dot{stroke-linecap:round}
@media (prefers-reduced-motion:no-preference){
  .trail-dot{animation:march 14s linear infinite, fadein 1s ease backwards}
}
@keyframes march{to{stroke-dashoffset:-200}}
@keyframes fadein{from{opacity:0}to{opacity:1}}

/* =================== POPUP =================== */
.leaflet-popup.t-pop .leaflet-popup-content-wrapper{background:linear-gradient(180deg,#F2E7CC,#E2CEA2);color:var(--ink);
  border:1px solid var(--brass-d);border-radius:11px;
  box-shadow:inset 0 1px 0 #FBF3DE,0 16px 40px rgba(25,15,4,.6);overflow:hidden;padding:0}
.leaflet-popup.t-pop .leaflet-popup-content{margin:0;width:264px!important;font-family:var(--body)}
.leaflet-popup.t-pop .leaflet-popup-tip{background:#E2CEA2;border:1px solid var(--brass-d)}
.leaflet-popup.t-pop a.leaflet-popup-close-button{color:var(--ink2);font-size:21px;padding:6px 8px 0 0}
.pp-img{width:100%;height:130px;object-fit:cover;display:block;background:var(--paper-d);filter:sepia(.25) contrast(1.03)}
.pp-body{padding:12px 15px 14px}
.pp-cat{font-family:var(--label);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--pc);font-weight:700}
.pp-name{font-family:var(--disp);font-size:21px;font-weight:400;margin:3px 0 6px;line-height:1.08;color:var(--ink)}
.pp-meta{font-family:var(--mono);font-size:10.5px;color:var(--ink3);margin-bottom:7px;display:flex;gap:9px;flex-wrap:wrap}
.pp-note{font-size:14.5px;line-height:1.5;color:var(--ink2)}
.pp-row{display:flex;gap:7px;margin-top:11px;align-items:center;flex-wrap:wrap}
.pp-badge{display:inline-block;padding:4px 9px;border-radius:6px;background:var(--pc);color:#fff6e6;
  font-family:var(--label);font-size:10.5px;font-weight:700;letter-spacing:.06em;text-shadow:0 1px 0 rgba(60,30,8,.4)}
.pp-go{font-family:var(--label);font-size:11.5px;letter-spacing:.04em;text-decoration:none;color:var(--ink);
  background:linear-gradient(180deg,var(--paper-l),var(--paper-d));border:1px solid var(--brass-d);border-radius:7px;padding:4px 9px;
  box-shadow:inset 0 1px 0 #FBF3DE,0 2px 0 #9A7B3C}
.pp-go:active{transform:translateY(2px);box-shadow:inset 0 2px 4px rgba(80,50,20,.4)}

/* leaflet chrome */
.leaflet-control-zoom{border:0!important;margin:14px!important}
.leaflet-control-zoom a{background:linear-gradient(180deg,var(--paper-l),var(--paper-d))!important;color:var(--ink)!important;
  border:1px solid var(--brass-d)!important;width:34px!important;height:34px!important;line-height:31px!important;font-size:19px!important;
  box-shadow:inset 0 1px 0 #FBF3DE}
.leaflet-control-zoom a:first-child{border-radius:9px 9px 0 0!important}
.leaflet-control-zoom a:last-child{border-radius:0 0 9px 9px!important}
.leaflet-control-zoom a:hover{background:linear-gradient(180deg,var(--brass),var(--brass-d))!important;color:#fff6e2!important}
.leaflet-control-attribution{background:rgba(231,216,181,.8)!important;color:var(--ink3)!important;font-size:9px!important;font-family:var(--mono)}
.leaflet-control-attribution a{color:var(--ink2)!important}

/* =================== MOBILE =================== */
.menu-btn.mb{display:none;font-size:18px;width:42px;height:42px;padding:0}
@media (max-width:900px){
  .brand .sub{display:none}.dates{display:none}
  .menu-btn.mb{display:flex;align-items:center;justify-content:center}
  .filters{top:auto;bottom:74px;left:12px;right:12px;transform:none;max-width:none;justify-content:flex-start;border-radius:11px}
  .win{top:auto;left:0;right:0;bottom:0;width:100%;max-height:66vh;border-radius:14px 14px 0 0;
    transform:translateY(calc(100% - 34px));transition:transform .32s cubic-bezier(.3,.8,.3,1)}
  .win.open{transform:translateY(0)}
  .titlebar{cursor:pointer}
  .now{bottom:auto;top:128px}
  .compass{display:none}
}
.sr{position:absolute;left:-9999px}
</style>
</head>
<body class="treasure">

<div id="map"></div>
<div class="scene-fx"><div class="vig"></div><div class="grain"></div></div>

<header class="hdr">
  <div class="brand">
    <span class="mark">Jime <em>&amp;</em> Moi</span>
    <span class="sub">El mapa del tesoro · Las Rockies</span>
  </div>
  <div class="hdr-right">
    <div class="dates"><b>26 Dic 2026 — 1 Ene 2027</b><br>7 días · Calgary · Banff · Canmore</div>
    <div class="seg" id="viewToggle">
      <button class="btn on" data-view="treasure">Tesoro</button>
      <button class="btn" data-view="sat">Satélite</button>
      <button class="btn" data-view="dark">Mapa</button>
    </div>
    <button class="btn menu-btn mb" id="menuBtn" aria-label="Ver bitácora">☰</button>
  </div>
</header>

<div class="filters" id="filters">
  <button class="btn chip on" data-cat="all"><span class="i">✦</span>Todo</button>
  <button class="btn chip" data-cat="comer"><span class="i">🍽️</span>Comer</button>
  <button class="btn chip" data-cat="hype"><span class="i">👟</span>Hype</button>
  <button class="btn chip" data-cat="girly"><span class="i">🎀</span>Girly</button>
  <button class="btn chip" data-cat="viral"><span class="i">📸</span>Virales</button>
  <button class="btn chip" data-cat="vistas"><span class="i">🏔️</span>Vistas</button>
  <button class="btn chip" data-cat="animales"><span class="i">🐺</span>Animales</button>
  <button class="btn chip" data-cat="actividad"><span class="i">❄️</span>Actividades</button>
  <button class="btn chip" data-cat="finde"><span class="i">🎆</span>Año Nuevo</button>
  <button class="btn chip" data-cat="shops"><span class="i">🛍️</span>Shops</button>
</div>

<aside class="win" id="win">
  <div class="titlebar" id="titlebar">
    <span class="tl-dots"><i class="r"></i><i class="y"></i><i class="g"></i></span>

/* ---------- MAP ---------- */
const map=L.map('map',{zoomControl:true,attributionControl:true,renderer:L.svg(),minZoom:4,maxZoom:17}).setView([51.3,-115.2],8);
const layers={
  treasure:L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}',{maxZoom:18,attribution:'© Esri · Mapa del Tesoro'}),
  sat:L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{maxZoom:18,attribution:'Imagery © Esri, Maxar'}),
  satLabels:L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}',{maxZoom:18,opacity:.9}),
  dark:L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:19,subdomains:'abcd',attribution:'© OpenStreetMap, © CARTO'})
};
function setView(v){
  [layers.treasure,layers.sat,layers.dark].forEach(l=>map.removeLayer(l)); map.removeLayer(layers.satLabels);
  document.body.classList.toggle('treasure',v==='treasure');
  if(v==='treasure'){layers.treasure.addTo(map);}
  else if(v==='sat'){layers.sat.addTo(map);layers.satLabels.addTo(map);}
  else{layers.dark.addTo(map);}
  document.querySelectorAll('#viewToggle button').forEach(b=>b.classList.toggle('on',b.dataset.view===v));
}
document.querySelectorAll('#viewToggle button').forEach(b=>b.onclick=()=>setView(b.dataset.view));

const markers=[];let mi=0;
function gmaps(lat,lng,name){return `https://www.google.com/maps/search/?api=1&query=${lat},${lng}`;}
function popHtml(o){
  const col=o.pc, imgH=o.img?`<img class="pp-img" src="${o.img}" alt="" onerror="this.remove()">`:'';
  const meta=o.metaLine?`<div class="pp-meta">${o.metaLine}</div>`:'';
  return `<div style="--pc:${col}">${imgH}<div class="pp-body">
     <div class="pp-cat">${o.cat}</div>
     <div class="pp-name">${o.name}</div>${meta}
     <div class="pp-note">${o.note}</div>
     <div class="pp-row"><span class="pp-badge">${o.badge}</span>
       <a class="pp-go" href="${gmaps(o.lat,o.lng)}" target="_blank" rel="noopener">▸ Cómo llegar</a></div>
   </div></div>`;
}

    const m=L.marker([s.lat,s.lng],{icon,riseOnHover:true}).addTo(map);
    m._fc=s.fc;m._di=di;m._kind='site';m._s=s;
    m.bindPopup(popHtml({pc:c,img:s.img,cat:FCLBL[s.fc]||s.fc,name:s.name,
      metaLine:`◷ ${s.t} &nbsp;·&nbsp; ${day.wx}`,note:s.note,badge:`Día ${day.n} · ${day.date}`,lat:s.lat,lng:s.lng}),
      {className:'t-pop',maxWidth:264,minWidth:264,autoPanPadding:[40,90]});
    markers.push(m);mi++;
  });
});
// treasure spot markers
SPOTS.forEach(sp=>{
  const c=FCCOL[sp.cat]||'#8A6526';sp.c=c;
  const html=`<div class="mk spot" style="--c:${c}">${sp.ic}</div>`;
  const icon=L.divIcon({html,className:'',iconSize:[26,26],iconAnchor:[13,13]});
  const m=L.marker([sp.lat,sp.lng],{icon,riseOnHover:true}).addTo(map);
  m._fc=sp.cat;m._di=null;m._kind='spot';m._sp=sp;
  m.bindPopup(popHtml({pc:c,cat:FCLBL[sp.cat]||sp.cat,name:sp.name,
    metaLine:`✕ ${sp.city}`,note:sp.note,badge:`Tesoro · ${sp.city}`,lat:sp.lat,lng:sp.lng}),
    {className:'t-pop',maxWidth:264,minWidth:264,autoPanPadding:[40,90]});
  sp._m=m;markers.push(m);
});

/* inter-day connectors removed in favor of street routes */

/* ---------- LEDGER: itinerary ---------- */
const trail=document.getElementById('trail');
TRIP.forEach((day,di)=>{
  const el=document.createElement('div');
  el.className='day';el.style.setProperty('--dc',day.c);el.dataset.di=di;
  const km=DIST&&DIST['d'+(di+1)]?DIST['d'+(di+1)]+' km':'—';
  const sitesHtml=day.sites.map((s,si)=>
    `<div class="site" data-di="${di}" data-si="${si}">
       <div class="s-time">${s.t}</div><div class="s-ico">${s.ic}</div><div class="s-name">${s.name}</div>
     </div>`).join('');
  el.innerHTML=
    `<div class="day-row">
       <div class="seal">${day.n}</div>
       <div class="day-meta">
         <div class="dtag">${day.tag}</div>
         <div class="dttl">${day.title}</div>
         <div class="dsub"><span class="pill">${day.date}</span><span class="pill">${day.trans}</span><span class="pill">🌡️ ${day.wx}</span><span class="pill">🧭 ${km}</span></div>
         <div class="dblurb">${day.blurb}</div>
         <div class="dtip"><b>Tip ·</b> ${day.tip}</div>
       </div>
     </div>
     <div class="sites">${sitesHtml}</div>`;
  trail.appendChild(el);
});

/* ---------- LEDGER: tesoros ---------- */
const tWrap=document.getElementById('treasures');
const cities=['Calgary','Banff','Canmore'];
cities.forEach(city=>{
  const list=SPOTS.filter(s=>s.city===city);
  if(!list.length)return;
  const block=document.createElement('div');block.className='tcity';
  block.innerHTML=`<h3>${city} <span class="cnt">${list.length}</span></h3>`+
    list.map(sp=>`<div class="tspot" data-id="${sp.id}" style="--cc:${FCCOL[sp.cat]}">
       <div class="tic">${sp.ic}</div>
       <div><div class="tn">${sp.name}</div><div class="tc">${FCLBL[sp.cat]}</div><div class="tnote">${sp.note}</div></div>
     </div>`).join('');
  tWrap.appendChild(block);
});

/* ---------- STATE + VISIBILITY ---------- */
let openDay=null,activeFilter='all';
document.getElementById('kmStat').textContent=DIST?Object.values(DIST).reduce((a,b)=>a+b,0):'—';

function applyVisibility(){
  markers.forEach(m=>{
    let show=(activeFilter==='all'||m._fc===activeFilter);
    if(m._kind==='site'&&openDay!==null) show=show&&(m._di===openDay);
    if(show){m.addTo(map);} else {map.removeLayer(m);}
  });
  Object.entries(dayLines).forEach(([k,arr])=>arr.forEach(l=>{
    const shadow=l.options.className==='trail-shadow';
    let op; if(openDay===null) op=shadow?.20:.95; else op=(+k===openDay)?(shadow?.28:1):(shadow?.05:.12);
    l.setStyle({opacity:op});
  }));
}
function setNow(){
  const t=document.getElementById('nowText');
  if(openDay===null) t.innerHTML=`Viaje completo · <b>7 días en las Rockies</b>`;
  else{const d=TRIP[openDay];t.innerHTML=`Día ${d.n} · <b>${d.title}</b>`;}
}
function fitAll(animate=true){
  const all=[];TRIP.forEach(d=>d.sites.forEach(s=>all.push([s.lat,s.lng])));
  const wide=window.innerWidth>900;
  const opts={paddingTopLeft:[wide?372:30,118],paddingBottomRight:[wide?120:30,wide?60:90]};
  if(animate)map.flyToBounds(L.latLngBounds(all),{...opts,duration:.8});
  else map.fitBounds(L.latLngBounds(all),{...opts,animate:false});
}
function focusDay(di){
  openDay=(openDay===di)?null:di;
  document.querySelectorAll('.day').forEach(d=>d.classList.toggle('open',+d.dataset.di===openDay));
  applyVisibility();setNow();
  if(openDay===null){fitAll();return;}
  const b=L.latLngBounds(TRIP[di].sites.map(s=>[s.lat,s.lng]));
  const wide=window.innerWidth>900;
  map.flyToBounds(b,{paddingTopLeft:[wide?372:40,120],paddingBottomRight:[wide?120:40,wide?60:280],maxZoom:13,duration:.8});
}
function resetView(refit){
  openDay=null;document.querySelectorAll('.day').forEach(d=>d.classList.remove('open'));
  applyVisibility();setNow();if(refit)fitAll();
}

/* day open */
document.querySelectorAll('.day').forEach(d=>{
  d.querySelector('.day-row').addEventListener('click',()=>focusDay(+d.dataset.di));
});
/* jump to a site */
trail.querySelectorAll('.site').forEach(si=>{
  si.addEventListener('click',e=>{
    e.stopPropagation();
    const di=+si.dataset.di,idx=+si.dataset.si;
    const target=markers.find(m=>m._kind==='site'&&m._di===di&&m._s===TRIP[di].sites[idx]);
    if(!target)return;
    if(window.innerWidth<=900)document.getElementById('win').classList.remove('open');
    if(!map.hasLayer(target)){activeFilter='all';document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('on',c.dataset.cat==='all'));applyVisibility();}
    map.flyTo([target._s.lat,target._s.lng],14,{duration:.7});
    setTimeout(()=>target.openPopup(),720);
  });
});
/* jump to a treasure */
tWrap.querySelectorAll('.tspot').forEach(el=>{
  el.addEventListener('click',()=>{
    const sp=SPOTS.find(s=>s.id===el.dataset.id);if(!sp)return;
    if(window.innerWidth<=900)document.getElementById('win').classList.remove('open');
    if(!map.hasLayer(sp._m)){activeFilter='all';document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('on',c.dataset.cat==='all'));applyVisibility();}
    map.flyTo([sp.lat,sp.lng],15,{duration:.7});
    setTimeout(()=>sp._m.openPopup(),720);
  });
});

/* ---------- TABS ---------- */
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');
  const log=t.dataset.tab==='log';
  document.getElementById('trail').style.display=log?'':'none';
  document.getElementById('treasures').style.display=log?'none':'';
  document.querySelector('.tl-title').textContent=log?'Bitácora de viaje':'Cofre de tesoros';
});
document.getElementById('btnSpots').onclick=()=>{document.querySelector('.tab[data-tab="treasures"]').click();
  document.getElementById('scroll').scrollTop=0;if(window.innerWidth<=900)document.getElementById('win').classList.add('open');};

/* ---------- FILTERS ---------- */
document.querySelectorAll('.chip').forEach(ch=>ch.onclick=()=>{
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));ch.classList.add('on');
  activeFilter=ch.dataset.cat;applyVisibility();
});
document.getElementById('btnAll').onclick=()=>resetView(true);
document.getElementById('menuBtn').onclick=()=>document.getElementById('win').classList.toggle('open');
document.getElementById('titlebar').addEventListener('click',()=>{if(window.innerWidth<=900)document.getElementById('win').classList.toggle('open');});

/* ---------- DRAG the window (desktop) ---------- */
(function(){
  const win=document.getElementById('win'),bar=document.getElementById('titlebar');
  let drag=false,sx,sy,ox,oy;
  bar.addEventListener('mousedown',e=>{
    if(window.innerWidth<=900)return;
    drag=true;sx=e.clientX;sy=e.clientY;
    const r=win.getBoundingClientRect();ox=r.left;oy=r.top;
    win.style.bottom='auto';win.style.right='auto';win.style.left=ox+'px';win.style.top=oy+'px';
    e.preventDefault();
  });
  window.addEventListener('mousemove',e=>{
    if(!drag)return;
    let nx=ox+(e.clientX-sx),ny=oy+(e.clientY-sy);
    nx=Math.max(6,Math.min(window.innerWidth-360,nx));ny=Math.max(66,Math.min(window.innerHeight-120,ny));
    win.style.left=nx+'px';win.style.top=ny+'px';
  });
  window.addEventListener('mouseup',()=>drag=false);
})();

/* ---------- INIT ---------- */
setTimeout(()=>{
  map.invalidateSize();
  resetView(false);
  fitAll(false);
  layers.treasure.addTo(map);
},160);
</script>
</body>
</html>
