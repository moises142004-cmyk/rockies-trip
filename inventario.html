<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Inventario · Jime & Moi — Las Rockies</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0A0F18">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Las Rockies">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="apple-touch-icon" sizes="167x167" href="/icons/icon-167.png">
<link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png">
<style>
.synced{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--mist-dim)}
.synced .pip{width:7px;height:7px;border-radius:50%;background:var(--good);box-shadow:0 0 8px var(--good)}
.synced.off .pip{background:var(--bad);box-shadow:none}

.ownseg{display:flex;gap:4px;background:var(--panel);border:1px solid var(--hair);border-radius:12px;padding:4px;margin:0 2px 16px;max-width:360px}
.ownseg button{flex:1;appearance:none;border:0;background:transparent;color:var(--mist);font-family:var(--disp);font-size:13px;font-weight:600;padding:9px 6px;border-radius:9px;cursor:pointer;transition:.15s}
.ownseg button:hover{color:var(--frost)}
.ownseg button.on{background:var(--frost);color:var(--abyss)}

.kpis{display:flex;gap:10px;flex-wrap:wrap;margin:0 2px 6px}
.kpi{flex:1;min-width:110px;background:var(--panel);border:1px solid var(--hair);border-radius:14px;padding:13px 15px;backdrop-filter:blur(16px)}
.kpi .n{font-family:var(--disp);font-size:24px;font-weight:700;line-height:1}
.kpi .n.amber{color:var(--amber)} .kpi .n.glacier{color:var(--glacier)} .kpi .n.good{color:var(--good)}
.kpi .l{font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--mist);margin-top:6px}
.bar{height:7px;border-radius:5px;background:var(--hair-2);overflow:hidden;margin:14px 2px 4px}
.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--glacier),var(--good));border-radius:5px;transition:width .35s}

.addbar{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;background:var(--panel);border:1px solid var(--hair);border-radius:14px;padding:13px;margin:18px 2px;backdrop-filter:blur(16px)}
.addbar .f{flex:1;min-width:120px} .addbar .f.name{flex:2;min-width:170px}
.addbar .btn{height:38px}

.chips{display:flex;gap:6px;flex-wrap:wrap;margin:6px 2px 4px}
.chip{appearance:none;border:1px solid var(--hair);background:transparent;color:var(--mist);font-family:var(--body);font-size:12px;font-weight:500;padding:7px 13px;border-radius:999px;cursor:pointer;transition:.14s}
.chip:hover{color:var(--frost);border-color:rgba(255,255,255,.22)}
.chip.on{background:var(--amber);color:#241500;font-weight:600;border-color:var(--amber)}

.person-h{font-family:var(--disp);font-size:18px;font-weight:600;color:var(--frost);display:flex;align-items:center;gap:10px;margin:26px 2px 4px}
.person-h .cnt{font-family:var(--mono);font-size:11px;color:var(--mist-dim);font-weight:400}
.items{display:flex;flex-direction:column;gap:7px;margin-top:4px}
.item{display:flex;align-items:center;gap:12px;padding:11px 13px;border:1px solid var(--hair-2);border-radius:12px;background:rgba(255,255,255,.02);transition:.14s}
.item:hover{border-color:var(--hair);background:rgba(255,255,255,.04)}
.item.packed{opacity:.55}
.item.packed .iname{text-decoration:line-through;text-decoration-color:var(--mist-dim)}
.item .iname{font-size:14px;font-weight:500;color:var(--frost);flex:1;min-width:0}
.tagbtn{appearance:none;cursor:pointer;border:1px solid var(--hair);background:transparent;font-family:var(--mono);font-size:8.5px;letter-spacing:.08em;text-transform:uppercase;padding:5px 9px;border-radius:7px;color:var(--mist);transition:.14s;white-space:nowrap}
.tagbtn:hover{color:var(--frost);border-color:rgba(255,255,255,.25)}
.tagbtn.buy{color:var(--warn);border-color:rgba(227,197,106,.4);background:rgba(227,197,106,.08)}
.tagbtn.bought{color:var(--good);border-color:rgba(130,192,138,.4);background:rgba(130,192,138,.1)}
.own{font-family:var(--mono);font-size:8.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--mist-dim);background:var(--hair-2);border:0;border-radius:7px;padding:5px 8px;cursor:pointer}
.own:hover{color:var(--frost)}
.del{appearance:none;border:0;background:transparent;color:var(--mist-dim);cursor:pointer;font-size:16px;line-height:1;padding:4px;border-radius:6px;transition:.14s}
.del:hover{color:var(--bad);background:rgba(236,140,118,.1)}
.subcat{font-family:var(--mono);font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--glacier);margin:14px 2px 6px}
.empty{text-align:center;color:var(--mist-dim);font-size:13px;padding:34px 0;font-family:var(--mono)}
@media (max-width:640px){
  .item{flex-wrap:wrap} .item .iname{flex-basis:100%}
  .addbar .f,.addbar .f.name{flex-basis:100%}
}
</style>
</head>
<body class="page">
<header class="pagehdr">
  <div class="brand"><a class="mark" href="index.html">Jime <em>&amp;</em> Moi</a><span class="dot"></span><span class="sub">Las Rockies</span></div>
  <nav class="sections">
    <a href="index.html"><span class="ic">🗺️</span>Mapa</a>
    <a class="on" href="inventario.html"><span class="ic">🎒</span>Inventario</a>
    <a href="costos.html"><span class="ic">💰</span>Costos</a>
  </nav>
</header>

<div class="wrap">
  <div class="phead">
    <div class="eyebrow">El bolso de invierno</div>
    <h1>Qué <em>llevamos</em></h1>
    <p>Lista compartida para −15°C. Cada quien tiene la suya (Moi / Jime) y los dos ven y editan todo, en vivo. <span class="synced" id="synced"><span class="pip"></span><span id="syncedTxt">en vivo</span></span></p>
  </div>

  <div class="ownseg" id="ownseg">
    <button data-own="moi">🧔 Moi</button>
    <button data-own="jime">👩 Jime</button>
    <button data-own="ambos" class="on">👫 Ambos</button>
  </div>

  <div class="kpis">
    <div class="kpi"><div class="n glacier" id="kTotal">—</div><div class="l">Ítems</div></div>
    <div class="kpi"><div class="n good" id="kPacked">—</div><div class="l">Empacados</div></div>
    <div class="kpi"><div class="n amber" id="kBuy">—</div><div class="l">Por comprar</div></div>
    <div class="kpi"><div class="n" id="kBought">—</div><div class="l">Comprado allá</div></div>
  </div>
  <div class="bar"><i id="bar" style="width:0%"></i></div>

  <div class="addbar">
    <div class="f name"><label>Agregar ítem</label><input id="addName" placeholder="ej. Buff de lana, souvenir…" autocomplete="off"></div>
    <div class="f"><label>De quién</label><select id="addOwner"></select></div>
    <div class="f"><label>Categoría</label><select id="addCat"></select></div>
    <div class="f"><label>Estado</label><select id="addStatus">
      <option value="tengo">Ya tengo</option>
      <option value="comprar">Comprar antes</option>
      <option value="comprado">Comprado allá 🇨🇦</option>
    </select></div>
    <button class="btn amber" id="addBtn">+ Agregar</button>
  </div>

  <div class="chips" id="chips">
    <button class="chip on" data-f="all">Todo</button>
    <button class="chip" data-f="topack">Por empacar</button>
    <button class="chip" data-f="packed">Empacado</button>
    <button class="chip" data-f="comprar">Por comprar 🛒</button>
    <button class="chip" data-f="comprado">Comprado allá 🇨🇦</button>
  </div>

  <div id="list"><div class="empty">Cargando…</div></div>
</div>

<script src="cloud.js"></script>
<script>
const CATS = ['Abrigo','Calzado','Accesorios','Higiene','Tech & Docs','Otros'];
const CAT_IC = {'Abrigo':'🧥','Calzado':'🥾','Accesorios':'🧤','Higiene':'🧴','Tech & Docs':'🔌','Otros':'🎒'};
const OWN_LBL = {moi:'🧔 Moi', jime:'👩 Jime'};
const $ = id => document.getElementById(id);
function esc(s){ return (s||'').replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

let items = [];
let view = 'ambos';
let filter = 'all';

function fillSelects(){
  $('addCat').innerHTML = CATS.map(c=>`<option value="${c}">${CAT_IC[c]} ${c}</option>`).join('');
  $('addOwner').innerHTML = `<option value="moi">🧔 Moi</option><option value="jime">👩 Jime</option>`;
}
function setSync(online){
  $('synced').classList.toggle('off', !online);
  $('syncedTxt').textContent = online ? 'en vivo' : 'sin conexión';
}

async function load(){
  const { rows, online } = await Cloud.listCached('trip_inventory','select=*&order=created_at.asc','inventory');
  items = rows; setSync(online); render();
}

function passesFilter(it){
  if (filter==='packed') return it.packed;
  if (filter==='topack') return !it.packed;
  if (filter==='comprar') return it.status==='comprar';
  if (filter==='comprado') return it.status==='comprado';
  return true;
}
function ownersInView(){ return view==='ambos' ? ['moi','jime'] : [view]; }

function render(){
  // KPIs over current owner view (ignoring the chip filter so totals are stable)
  const inView = items.filter(i=>ownersInView().includes(i.owner));
  const total = inView.length, packed = inView.filter(i=>i.packed).length;
  $('kTotal').textContent = total;
  $('kPacked').textContent = packed;
  $('kBuy').textContent = inView.filter(i=>i.status==='comprar').length;
  $('kBought').textContent = inView.filter(i=>i.status==='comprado').length;
  $('bar').style.width = (total? Math.round(packed/total*100):0) + '%';

  const list = $('list');
  const owners = ownersInView();
  let html = '';
  owners.forEach(o=>{
    const mine = items.filter(i=>i.owner===o && passesFilter(i));
    if (view==='ambos') html += `<div class="person-h">${OWN_LBL[o]} <span class="cnt">${mine.length}</span></div>`;
    if (!mine.length){ html += `<div class="empty">Nada acá todavía.</div>`; return; }
    const groups = {};
    mine.forEach(it=>{ (groups[it.cat] ||= []).push(it); });
    CATS.filter(c=>groups[c]).forEach(cat=>{
      html += `<div class="subcat">${CAT_IC[cat]} ${cat}</div><div class="items">${groups[cat].map(rowHtml).join('')}</div>`;
    });
  });
  list.innerHTML = html || `<div class="empty">Nada acá todavía.</div>`;
}
function rowHtml(it){
  const tag = it.status==='comprar' ? `<button class="tagbtn buy" data-act="status" data-id="${it.id}">🛒 Comprar</button>`
            : it.status==='comprado' ? `<button class="tagbtn bought" data-act="status" data-id="${it.id}">🇨🇦 Comprado</button>`
            : `<button class="tagbtn" data-act="status" data-id="${it.id}">Ya tengo</button>`;
  return `<div class="item ${it.packed?'packed':''}">
    <input type="checkbox" class="check" data-act="pack" data-id="${it.id}" ${it.packed?'checked':''} aria-label="Empacado">
    <div class="iname">${esc(it.name)}</div>
    ${tag}
    <button class="own" data-act="own" data-id="${it.id}" title="Cambiar de lista">${OWN_LBL[it.owner]}</button>
    <button class="del" data-act="del" data-id="${it.id}" title="Eliminar">×</button>
  </div>`;
}

async function addItem(){
  const name = $('addName').value.trim(); if(!name) return;
  const obj = { owner:$('addOwner').value, name, cat:$('addCat').value, status:$('addStatus').value, packed:false };
  $('addName').value='';
  try {
    const row = await Cloud.insert('trip_inventory', obj);
    items.push(row); render(); $('addName').focus();
  } catch(e){ setSync(false); alert('No se pudo guardar (sin conexión). Probá de nuevo.'); }
}

document.addEventListener('click', async e=>{
  const t = e.target.closest('[data-act]'); if(!t) return;
  const id = t.dataset.id, act = t.dataset.act;
  const it = items.find(i=>i.id===id); if(!it) return;
  let patch=null;
  if (act==='pack')   patch = { packed: t.checked };
  else if (act==='status') patch = { status: it.status==='tengo'?'comprar':it.status==='comprar'?'comprado':'tengo' };
  else if (act==='own')    patch = { owner: it.owner==='moi'?'jime':'moi' };
  else if (act==='del'){
    items = items.filter(i=>i.id!==id); render();
    try { await Cloud.remove('trip_inventory', id); } catch(err){ setSync(false); load(); }
    return;
  }
  Object.assign(it, patch); render();
  try { await Cloud.update('trip_inventory', id, patch); } catch(err){ setSync(false); load(); }
});
$('addBtn').onclick = addItem;
$('addName').addEventListener('keydown', e=>{ if(e.key==='Enter') addItem(); });
document.querySelectorAll('.chip').forEach(c=>c.onclick=()=>{
  document.querySelectorAll('.chip').forEach(x=>x.classList.remove('on')); c.classList.add('on');
  filter = c.dataset.f; render();
});
document.querySelectorAll('#ownseg button').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('#ownseg button').forEach(x=>x.classList.toggle('on',x===b));
  view = b.dataset.own;
  if (view!=='ambos') $('addOwner').value = view;
  render();
});

fillSelects();
load();
// live sync: refresh while visible
setInterval(()=>{ if(!document.hidden) load(); }, 5000);
window.addEventListener('focus', load);
</script>

  <a href="index.html"><span class="ic">🗺️</span><span>Mapa</span></a>
  <a class="on" href="inventario.html"><span class="ic">🎒</span><span>Inventario</span></a>
  <a href="costos.html"><span class="ic">💰</span><span>Costos</span></a>
</nav>

</body>
</html>
